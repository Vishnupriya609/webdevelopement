<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Float</title>
    <style>
        footer{
            display: block;
            background-color: darkorchid;
            color: white;
            clear:both;
        }
        .cat {
            background-color: aquamarine;
            display: inline-block;

        }
       
        .dog {
            display: inline-block;
            background-color: coral;
        }
        first-para{
            float: left;
        }
        second-para{
            float: right;
        }
    </style>
</head>
<body>
    <div class="cat">
     <h1>Cat CSS</h1>
    <img src="./assests/images/cat.png" alt="memecat" width="200px" height="200px"/>
    <p class="first-para">Cats are one of the most popular pets in the world. They are playful,
intelligent, and independent animals.</p>
</div>
<div class="dog">
    <h1>DogCSS</h1>
    <img src="./assests/images/dog.png" alt="cute puppy" width="200px" height="200px"/>
    <p class="second-para"> Dogs are loyal and friendly animals. They are known as man's best friend because they are loving,intelligent, and protective...</p>
    </div>
    <footer><center>Copyright</center></footer>
</body>
</html>
